<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Foreground</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caprasimo&family=Figtree:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply the saved (or system) theme before first paint so a dark-mode
      // load never flashes light. Kept in sync by src/lib/theme.ts.
      ;(() => {
        try {
          const saved = localStorage.getItem('planner-theme-v1')
          const dark =
            saved === 'dark' ||
            (saved !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.classList.toggle('dark', dark)
        } catch {
          /* no storage: stay light */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
